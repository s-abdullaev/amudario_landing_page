[build]
  command = "npm run build"
  publish = "dist"

# Single server redirect: `/` → English (no Accept-Language routing on `/`).
[[redirects]]
  from = "/"
  to = "/en/"
  status = 301
  force = true

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
